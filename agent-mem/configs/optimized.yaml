# optimized: prefix cache + C8 int8 KV + LMCache（三档递进最高档，Ascend 专用）
#
# C8 int8 KV 走 `--quantization ascend` + 模型 quant_model_description.json
# （非 no-op 的 `--kv-cache-dtype int8`，见 docs/F1-c8-injection.md）。
# 本档特性（C8 KV + LMCache）均 Ascend-only → backend 必为 vllm-ascend。
# 前置：python -m agent_mem.kv.c8 annotate models/Qwen2.5-7B-Instruct
#       python -m agent_mem.kv.c8 inject-scales models/Qwen2.5-7B-Instruct
engine:
  backend: vllm-ascend          # C8 KV + LMCache 均 Ascend-only
  model: Qwen2.5-7B-Instruct
  extra_args:
    - "--quantization ascend"   # F1: C8 int8 KV（显存砍半，scale 见 quant_description）
  lmcache:
    enabled: true               # F4: GPU↔CPU↔SSD 三级
    config_file: local          # 打包模板 src/agent_mem/kv/lmcache_local.yaml

benchmark:
  suite: tau-bench
  domain: retail
  runs: 3
  seed: 42

metrics:
  - e2e_latency_p50
  - e2e_latency_p95
  - qps
  - mem_peak_mb
  - kv_cache_hit_rate
  - task_success_rate
  - ttft
