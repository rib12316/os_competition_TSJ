# optimized: prefix cache + int8 KV + LMCache（三档递进最高档）
# v2：FP8 在 910B 作废（无 FP8 单元）→ int8（Ascend 上 KV 量化的唯一支持格式）。
engine:
  backend: vllm
  model: Qwen2.5-7B-Instruct
  extra_args:
    - "--kv-cache-dtype int8_per_token_head"     # F1: int8 KV 在线动态量化
  lmcache:
    enabled: true                 # F4: GPU↔CPU↔SSD 三级
    config_file: local            # 打包模板 src/agent_mem/kv/lmcache_local.yaml

benchmark:
  suite: tau-bench
  domain: retail
  runs: 3
  seed: 42

metrics:
  - e2e_latency_p50
  - e2e_latency_p95
  - qps
  - mem_peak_mb
  - kv_cache_hit_rate
  - task_success_rate
  - ttft
