# F2 · Prompt / 上下文压缩（缝D：上下文中间件 transform_messages）。
# 对 system prompt / 冷历史用压缩器（LLMLingua）压 2–4×，发引擎前变换 messages。
# 纯 agent 层，与硬件无关。
#
# ⚠️ 红线：压过头伤成功率，必须配 ablation，成功率下降 ≤ 2pp。
# ✅ 已实现：CompressMiddleware 已 register("compress")，此档开箱可用。
#    llmlingua 为可选依赖：pip install llmlingua（或 agent-mem[compress]）。
#    未安装时仅 import 包/跑单测不受影响（惰性 import）。
#
# 独立性：只开关自己（middleware.active=[compress]）。
engine:
  backend: vllm
  model: Qwen2.5-7B-Instruct
  extra_args: []                 # V1 默认开 prefix cache

benchmark:
  suite: tau-bench
  domain: retail
  runs: 3
  seed: 42

middleware:                       # 缝D
  active: [compress]             # 已注册，开箱激活
  options:
    compress:
      # —— 方案 A：单一方法 + 触发门 ——
      method: longllmlingua      # llmlingua | longllmlingua | llmlingua2（ablation 可切）
      rate: 0.4                  # 保留比例（0.4=保留 40%≈2.5× 压缩）
      trigger_tokens: 4000       # 冷历史 < 此值不压（短上下文无 lost-in-the-middle，省延迟）
      keep_hot: 6                # 热尾保留条数（自动 snap 到完整 tool_call→tool 组）
      device: cpu                # 压缩器小模型放 CPU，NPU 让给主 LLM
      model_name: gpt2           # 小模型(开发/冒烟用)；生产可换 NousResearch/Llama-2-7b-hf 提质量
      # —— 后端：隔离 venv 子进程（绕开主 venv transformers 5.x ↔ llmlingua 4.x 冲突）——
      backend: subprocess        # subprocess(默认, 推荐) | inprocess(仅隔离 venv 自身跑时)
      worker_venv: /data/os_competition_TSJ/.venv-compress/bin/python  # 隔离压缩 venv 的 python
      worker_script: ""          # 空=用随包的 agent_mem/middleware/_compress_worker.py
      # —— LongLLMLingua 专属（method=longllmlingua 才用；枚举值对齐 llmlingua 0.2.2）——
      condition_in_question: after             # question-aware（0.2.2 认 none/before/after）
      dynamic_context_compression_ratio: 0.3   # 分段动态压缩率（冗余段压狠）
      condition_compare: false                 # 0.2.2 下 True 会改 condition 值致分发失配；ablation 再试
      reorder_context: original                # 保时序（0.2.2 认 original/two_stage）

metrics:
  - e2e_latency_p50
  - e2e_latency_p95
  - qps
  - mem_peak_mb
  - kv_cache_hit_rate
  - task_success_rate
  - ttft
