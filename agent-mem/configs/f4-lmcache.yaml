# F4 · LMCache Ascend 分层（缝C：NPU↔CPU↔Disk 三级 KV cache）
# vllm-ascend 0.22.1rc1 已内置 LMCacheAscendConnector（KVConnectorFactory 注册）。
# NPU 关时可写 config + 单测；NPU 开时需先编译 lmcache_ascend（见 docs/F4-lmcache-ascend.md）。
#
# 独立性：只开关自己（engine.kv_transfer.connector）。
engine:
  backend: vllm-ascend
  model: Qwen2.5-7B-Instruct
  extra_args: []
  kv_transfer:
    connector: LMCacheAscendConnector       # 缝C：激活 Ascend LMCache
    role: kv_both                           # 同时 produce + consume KV blocks

benchmark:
  suite: tau-bench
  domain: retail
  runs: 3
  seed: 42

metrics:
  - e2e_latency_p50
  - e2e_latency_p95
  - qps
  - mem_peak_mb
  - kv_cache_hit_rate
  - task_success_rate
  - ttft
