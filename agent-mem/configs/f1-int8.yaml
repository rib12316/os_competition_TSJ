# F1 · int8 KV 量化（缝A） — 2026-07-20 ❌ 暂停
# 910B 无 FP8 单元，Ascend 上三条 int8 KV 路均不通：
#   - int8: vllm 枚举不存在，no-op
#   - int8_per_token_head: Ascend reshape_kv_cache 按 float16 算 buffer → RuntimeError
#   - C8 (--quantization ascend): 需 msmodelslim 校准文件，非校准模型不可用
# 详见 docs/F1-int8-kv-cache.md
# 本 yaml 保留供 vllm-ascend 后续升级后启用。
engine:
  backend: vllm-ascend          # int8 KV 是 Ascend 特性，真机跑在 NPU
  model: Qwen2.5-7B-Instruct
  extra_args:
    - "--kv-cache-dtype int8_per_token_head"   # F1: int8 KV 在线动态量化（per-token-per-head scale），无需校准

benchmark:
  suite: tau-bench
  domain: retail
  runs: 3
  seed: 42

metrics:
  - e2e_latency_p50
  - e2e_latency_p95
  - qps
  - mem_peak_mb
  - kv_cache_hit_rate
  - task_success_rate
  - ttft
