# F1 · int8 KV 量化（缝A · 精度层，C8）—— vllm-ascend 原生 C8。
#
# 真实现：不走 no-op 的 `--kv-cache-dtype int8`；走 `--quantization ascend` + 模型目录的
#   `quant_model_description.json`（AscendC8KVCacheAttentionMethod）。`c8.enabled` 自动注入
#   `--quantization ascend` + `--compilation-config {"cudagraph_mode":"FULL_DECODE_ONLY"}`
#   （FULL decode 在 910B 确定性死锁，故强制 FULL_DECODE_ONLY）。
#   详见 docs/F1-c8-injection.md（§3 校准坑、§5b Qwen2.5-7B 实测 before/after）。
#
# 前置（跑前一次性，需 NPU 做校准）：
#   1) 注入 quant_description：python -m agent_mem.kv.c8 annotate models/Qwen2.5-7B-Instruct
#   2) post-RoPE 自校准（写 per-channel MinMax scale，**关键**——hook 错张量会出垃圾）：
#      PYTHONPATH=agent-mem/src:$PYTHONPATH python scripts/calibrate_c8_qwen2.py
#   还原 stock：python -m agent_mem.kv.c8 restore models/Qwen2.5-7B-Instruct
#
# 独立性：只开关自己（KV 量化），不改别的功能；before/after = baseline vs 本档。
engine:
  backend: vllm-ascend          # C8 是 Ascend 特性
  model: Qwen2.5-7B-Instruct
  c8:
    enabled: true               # 注入 --quantization ascend + FULL_DECODE_ONLY
    patch_qwen2: true           # Qwen2.5=Qwen2 架构，patch_gqa_c8 不覆盖 → sitecustomize 补 scale 加载
  # extra_args 不再放 --quantization ascend（c8.enabled 负责注入）

benchmark:
  suite: tau-bench
  domain: retail
  runs: 3
  seed: 42

metrics:
  - e2e_latency_p50
  - e2e_latency_p95
  - qps
  - mem_peak_mb
  - kv_cache_hit_rate
  - task_success_rate
  - ttft
