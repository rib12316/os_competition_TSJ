# LMCache 本地分层配置模板（F4 · 缝C）。
#
# 三级 KV cache：NPU(HBM) ↔ CPU(DRAM) ↔ Disk。vllm-ascend 经 LMCache-Ascend 插件
# 消费此文件（环境变量 LMCACHE_CONFIG_FILE 指向它，启动加 --enable-lmcache）。
#
# 这是**起点模板**——真值（chunk_size / 各级容量 / 是否开 disk）在 F4 真机联调时定，
# 配合 before/after（显存峰值↓ vs 延迟/成功率）调参。文档：
#   https://docs.vllm.ai/projects/ascend/en/latest/user_guide/feature_guide/lmcache_ascend_deployment.html
chunk_size: 256          # KV 块大小（token 数），常取 64/128/256
local_cpu: true          # 二级：CPU DRAM 缓存
max_local_cpu_size: 5    # CPU 缓存上限（GiB）
# 三级：本地磁盘缓存（按需开启；SSD 才有意义）
save_disk_cache: false
# 远端缓存（多机 / 跨进程共享；本机单进程 demo 关掉）
remote: null
